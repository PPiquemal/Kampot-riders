<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a0a">
<title>Kampot Riders</title>
<link rel="manifest" href="data:application/json,{}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a0a;
    --surface: #241212;
    --surface2: #2e1818;
    --gold: #d4a843;
    --gold-dim: #8a6a2a;
    --red: #c42030;
    --red-bright: #e83040;
    --text: #f0e8dc;
    --text-dim: #8a7a6a;
    --green: #30b860;
    --blue: #4a90d4;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', 'Noto Sans Khmer', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid rgba(212,168,67,0.1);
    z-index: 1000;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--gold), #e8c860);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-status {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .header-status.idle { color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08); }
  .header-status.recording { color: var(--red-bright); border: 1px solid var(--red); animation: pulse 1.5s infinite; }
  .header-status.paused { color: var(--gold); border: 1px solid var(--gold-dim); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* === MAP === */
  .map-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  #map {
    width: 100%;
    height: 100%;
  }
  .leaflet-control-attribution { font-size: 9px !important; }

  /* GPS accuracy indicator */
  .gps-indicator {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 800;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(26,10,10,0.85);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .gps-dot.good { background: var(--green); }
  .gps-dot.fair { background: var(--gold); }
  .gps-dot.poor { background: var(--red); }

  /* Auto-pause badge */
  .pause-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 800;
    background: rgba(26,10,10,0.9);
    backdrop-filter: blur(10px);
    color: var(--gold);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 12px 28px;
    border-radius: 30px;
    border: 1px solid var(--gold-dim);
    display: none;
    pointer-events: none;
    animation: fadeIn 0.3s;
  }
  .pause-badge.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } }

  /* === STATS PANEL === */
  .stats-panel {
    background: var(--surface);
    border-top: 1px solid rgba(212,168,67,0.1);
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-box {
    text-align: center;
    padding: 6px 4px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.03);
  }
  .stat-value {
    font-size: 1.4rem;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat-value.speed { color: var(--gold); }
  .stat-value.distance { color: var(--green); }
  .stat-label {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Second row */
  .stats-row2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }
  .stat-mini {
    text-align: center;
    padding: 4px;
  }
  .stat-mini .stat-value {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .stat-mini .stat-label {
    font-size: 0.55rem;
  }

  /* === CONTROLS === */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 16px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .btn-record {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 3px solid var(--red);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .btn-record:active { transform: scale(0.92); }

  .btn-record-inner {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--red-bright);
    transition: all 0.3s;
  }
  .btn-record.recording .btn-record-inner {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--red-bright);
  }

  .btn-secondary {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn-secondary:active { transform: scale(0.92); background: rgba(255,255,255,0.05); }
  .btn-secondary.hidden { opacity: 0; pointer-events: none; }
  .btn-secondary svg { width: 20px; height: 20px; stroke: var(--text-dim); fill: none; stroke-width: 2; }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(26,10,10,0.92);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 24px;
    border: 1px solid rgba(212,168,67,0.15);
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* === TRACKS LIST OVERLAY === */
  .overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 5000;
    display: none;
    flex-direction: column;
    overflow-y: auto;
  }
  .overlay.visible { display: flex; }
  .overlay-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid rgba(212,168,67,0.1);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .overlay-header h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
  }
  .overlay-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tracks-list { padding: 12px 16px; }
  .track-item {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: background 0.15s;
  }
  .track-item:active { background: rgba(255,255,255,0.05); }
  .track-item-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .track-item-date { font-size: 0.8rem; font-weight: 600; color: var(--text); }
  .track-item-actions { display: flex; gap: 8px; }
  .track-item-actions button {
    background: none; border: none; color: var(--text-dim);
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer; padding: 4px 8px;
    border-radius: 6px; transition: all 0.15s;
  }
  .track-item-actions button:hover { color: var(--gold); background: rgba(212,168,67,0.08); }
  .track-item-actions button.delete:hover { color: var(--red-bright); background: rgba(200,30,30,0.08); }
  .track-item-stats {
    display: flex; gap: 16px;
    font-size: 0.75rem; color: var(--text-dim);
  }
  .track-item-stats span { font-weight: 600; color: var(--text); }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>KAMPOT RIDERS</h1>
  <div class="header-status idle" id="statusBadge">GPS OFF</div>
</div>

<!-- Map -->
<div class="map-container">
  <div id="map"></div>
  <div class="gps-indicator" id="gpsIndicator">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsText">En attente GPS...</span>
  </div>
  <div class="pause-badge" id="pauseBadge">⏸ AUTO-PAUSE</div>
</div>

<!-- Stats -->
<div class="stats-panel">
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value speed" id="speed">0.0</div>
      <div class="stat-label">km/h</div>
    </div>
    <div class="stat-box">
      <div class="stat-value distance" id="distance">0.00</div>
      <div class="stat-label">km</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="movingTime">00:00</div>
      <div class="stat-label">Temps actif</div>
    </div>
  </div>
  <div class="stats-row2">
    <div class="stat-mini">
      <div class="stat-value" id="elevation">0</div>
      <div class="stat-label">Alt. m</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="elevGain">↑ 0</div>
      <div class="stat-label">D+ m</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="avgSpeed">0.0</div>
      <div class="stat-label">Moy. km/h</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="totalTime">00:00</div>
      <div class="stat-label">Temps total</div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="btn-secondary" id="btnTracks" title="Tracks">
    <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
  </div>
  <div class="btn-record" id="btnRecord">
    <div class="btn-record-inner"></div>
  </div>
  <div class="btn-secondary hidden" id="btnExport" title="Export GPX">
    <span>GPX</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Tracks Overlay -->
<div class="overlay" id="tracksOverlay">
  <div class="overlay-header">
    <h2>Mes parcours</h2>
    <button class="overlay-close" id="btnCloseOverlay">✕</button>
  </div>
  <div class="tracks-list" id="tracksList"></div>
</div>

<script>
// ===========================
// KAMPOT RIDERS PWA — v0.1
// Record Module
// ===========================

const AUTO_PAUSE_RADIUS = 15; // meters
const MIN_ACCURACY = 30;      // ignore positions with accuracy > 30m
const ALTITUDE_SMOOTH = 3;    // simple moving average window
const SPEED_THRESHOLD = 1.5;  // km/h — below this = probably stationary

// --- State ---
const state = {
  recording: false,
  autoPaused: false,
  watchId: null,
  track: [],              // { lat, lng, alt, time, speed, accuracy }
  anchorPoint: null,      // last valid moving position
  totalDistance: 0,        // meters
  elevationGain: 0,       // meters
  movingTimeMs: 0,
  lastMovingTick: null,
  startTime: null,
  altitudeBuffer: [],
  currentSpeed: 0,
  currentAlt: 0,
  timerInterval: null
};

// --- Map setup ---
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true
}).setView([10.594, 104.162], 13); // Kampot center

L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OSM & CyclOSM'
}).addTo(map);

// Track polyline
const trackLine = L.polyline([], {
  color: '#e83040',
  weight: 4,
  opacity: 0.85,
  smoothFactor: 1
}).addTo(map);

// Position marker
const posMarker = L.circleMarker([0, 0], {
  radius: 7,
  fillColor: '#4a90d4',
  fillOpacity: 1,
  stroke: true,
  color: '#fff',
  weight: 2
});

// Accuracy circle
const accCircle = L.circle([0, 0], {
  radius: 10,
  fillColor: '#4a90d4',
  fillOpacity: 0.08,
  stroke: true,
  color: '#4a90d4',
  weight: 1,
  opacity: 0.2
});

// --- DOM refs ---
const $ = id => document.getElementById(id);
const btnRecord = $('btnRecord');
const btnExport = $('btnExport');
const btnTracks = $('btnTracks');
const statusBadge = $('statusBadge');
const pauseBadge = $('pauseBadge');
const gpsDot = $('gpsDot');
const gpsText = $('gpsText');

// --- Utility ---
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function smoothAltitude(alt) {
  state.altitudeBuffer.push(alt);
  if (state.altitudeBuffer.length > ALTITUDE_SMOOTH) state.altitudeBuffer.shift();
  return state.altitudeBuffer.reduce((a, b) => a + b, 0) / state.altitudeBuffer.length;
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- GPS handling ---
function onPosition(pos) {
  const { latitude: lat, longitude: lng, altitude: rawAlt, accuracy, speed: rawSpeed } = pos.coords;
  const time = pos.timestamp;

  // Update GPS indicator
  if (accuracy <= 10) { gpsDot.className = 'gps-dot good'; gpsText.textContent = `±${Math.round(accuracy)}m`; }
  else if (accuracy <= MIN_ACCURACY) { gpsDot.className = 'gps-dot fair'; gpsText.textContent = `±${Math.round(accuracy)}m`; }
  else { gpsDot.className = 'gps-dot poor'; gpsText.textContent = `±${Math.round(accuracy)}m (faible)`; }

  // Reject poor accuracy
  if (accuracy > MIN_ACCURACY) return;

  // Update position on map
  posMarker.setLatLng([lat, lng]).addTo(map);
  accCircle.setLatLng([lat, lng]).setRadius(accuracy).addTo(map);

  // Altitude smoothing
  const alt = rawAlt != null ? smoothAltitude(rawAlt) : state.currentAlt;
  state.currentAlt = alt;

  // Speed — prefer GPS speed, fallback to calculated
  let speedKmh = 0;
  if (rawSpeed != null && rawSpeed >= 0) {
    speedKmh = rawSpeed * 3.6;
  } else if (state.track.length > 0) {
    const last = state.track[state.track.length - 1];
    const dt = (time - last.time) / 1000;
    if (dt > 0) {
      const d = haversine(last.lat, last.lng, lat, lng);
      speedKmh = (d / dt) * 3.6;
    }
  }
  state.currentSpeed = speedKmh;

  // Center map (soft follow)
  if (state.recording) {
    map.panTo([lat, lng], { animate: true, duration: 0.5 });
  }

  // Not recording → just show position
  if (!state.recording) return;

  // --- Auto-pause logic ---
  if (!state.anchorPoint) {
    state.anchorPoint = { lat, lng, time };
  }

  const distFromAnchor = haversine(state.anchorPoint.lat, state.anchorPoint.lng, lat, lng);

  if (distFromAnchor <= AUTO_PAUSE_RADIUS && speedKmh < SPEED_THRESHOLD) {
    // Within pause radius and slow
    if (!state.autoPaused) {
      state.autoPaused = true;
      state.lastMovingTick = null;
      statusBadge.textContent = 'EN PAUSE';
      statusBadge.className = 'header-status paused';
      pauseBadge.classList.add('visible');
    }
    return; // Don't record this point
  }

  // Moving — resume if paused
  if (state.autoPaused) {
    state.autoPaused = false;
    state.lastMovingTick = Date.now();
    statusBadge.textContent = '● REC';
    statusBadge.className = 'header-status recording';
    pauseBadge.classList.remove('visible');
  }

  // Update anchor to current position
  state.anchorPoint = { lat, lng, time };

  // Calculate distance from last track point
  if (state.track.length > 0) {
    const last = state.track[state.track.length - 1];
    const segDist = haversine(last.lat, last.lng, lat, lng);

    // Ignore teleports (GPS jumps)
    if (segDist > 500) return;

    state.totalDistance += segDist;

    // Elevation gain (only count uphill, threshold 2m to filter noise)
    if (alt != null && last.alt != null) {
      const dAlt = alt - last.alt;
      if (dAlt > 2) state.elevationGain += dAlt;
    }
  }

  // Moving time tracking
  const now = Date.now();
  if (state.lastMovingTick) {
    state.movingTimeMs += now - state.lastMovingTick;
  }
  state.lastMovingTick = now;

  // Record point
  const point = { lat, lng, alt, time, speed: speedKmh, accuracy };
  state.track.push(point);

  // Update track line
  trackLine.addLatLng([lat, lng]);

  // Update stats display
  updateStats();
}

function onPositionError(err) {
  gpsDot.className = 'gps-dot poor';
  gpsText.textContent = 'GPS indisponible';
  console.warn('GPS error:', err.message);
}

function updateStats() {
  $('speed').textContent = state.currentSpeed.toFixed(1);
  $('distance').textContent = (state.totalDistance / 1000).toFixed(2);
  $('elevation').textContent = Math.round(state.currentAlt);
  $('elevGain').textContent = `↑ ${Math.round(state.elevationGain)}`;

  const avgSpd = state.movingTimeMs > 0
    ? (state.totalDistance / 1000) / (state.movingTimeMs / 3600000)
    : 0;
  $('avgSpeed').textContent = avgSpd.toFixed(1);
}

function updateTimers() {
  if (!state.recording) return;

  // Moving time (only accumulate when not paused)
  if (!state.autoPaused && state.lastMovingTick) {
    const now = Date.now();
    const displayed = state.movingTimeMs + (now - state.lastMovingTick);
    $('movingTime').textContent = formatTime(displayed);
  } else {
    $('movingTime').textContent = formatTime(state.movingTimeMs);
  }

  // Total time
  if (state.startTime) {
    $('totalTime').textContent = formatTime(Date.now() - state.startTime);
  }
}

// --- Recording controls ---
function startRecording() {
  // Reset state
  state.track = [];
  state.totalDistance = 0;
  state.elevationGain = 0;
  state.movingTimeMs = 0;
  state.lastMovingTick = Date.now();
  state.startTime = Date.now();
  state.anchorPoint = null;
  state.autoPaused = false;
  state.altitudeBuffer = [];
  state.recording = true;

  // Clear previous track
  trackLine.setLatLngs([]);

  // UI
  btnRecord.classList.add('recording');
  btnExport.classList.add('hidden');
  statusBadge.textContent = '● REC';
  statusBadge.className = 'header-status recording';

  // Start timer
  state.timerInterval = setInterval(updateTimers, 1000);

  // Start GPS if not already watching
  if (!state.watchId) {
    state.watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
      enableHighAccuracy: true,
      maximumAge: 2000,
      timeout: 10000
    });
  }

  toast('Enregistrement démarré');
}

function stopRecording() {
  state.recording = false;
  state.autoPaused = false;

  // Final moving time calc
  if (state.lastMovingTick) {
    state.movingTimeMs += Date.now() - state.lastMovingTick;
    state.lastMovingTick = null;
  }

  clearInterval(state.timerInterval);

  // UI
  btnRecord.classList.remove('recording');
  statusBadge.textContent = 'ARRÊTÉ';
  statusBadge.className = 'header-status idle';
  pauseBadge.classList.remove('visible');

  updateStats();
  updateTimers();

  if (state.track.length > 1) {
    btnExport.classList.remove('hidden');
    saveTrackToStorage();
    toast(`Parcours sauvegardé — ${(state.totalDistance / 1000).toFixed(2)} km`);
  } else {
    toast('Pas assez de points enregistrés');
  }
}

btnRecord.addEventListener('click', () => {
  if (!state.recording) {
    startRecording();
  } else {
    stopRecording();
  }
});

// --- GPX Export ---
function generateGPX(track, name) {
  const pts = track.map(p => {
    const d = new Date(p.time).toISOString();
    const ele = p.alt != null ? `<ele>${p.alt.toFixed(1)}</ele>` : '';
    return `      <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lng.toFixed(7)}">${ele}<time>${d}</time></trkpt>`;
  }).join('\n');

  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="KampotRiders PWA"
  xmlns="http://www.topografix.com/GPX/1/1">
  <metadata>
    <name>${name}</name>
    <time>${new Date().toISOString()}</time>
  </metadata>
  <trk>
    <name>${name}</name>
    <trkseg>
${pts}
    </trkseg>
  </trk>
</gpx>`;
}

function exportGPX() {
  if (state.track.length < 2) return;
  const name = `KampotRiders_${new Date().toISOString().slice(0,10)}`;
  const gpx = generateGPX(state.track, name);
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}.gpx`;
  a.click();
  URL.revokeObjectURL(url);
  toast('GPX exporté');
}

btnExport.addEventListener('click', exportGPX);

// --- IndexedDB storage ---
const DB_NAME = 'kampot_riders';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('tracks')) {
        db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function saveTrackToStorage() {
  if (!db || state.track.length < 2) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').add({
    date: new Date().toISOString(),
    distance: state.totalDistance,
    elevGain: state.elevationGain,
    movingTime: state.movingTimeMs,
    totalTime: Date.now() - state.startTime,
    points: state.track
  });
}

async function loadTracks() {
  if (!db) return [];
  return new Promise((resolve) => {
    const tx = db.transaction('tracks', 'readonly');
    const req = tx.objectStore('tracks').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

async function deleteTrack(id) {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').delete(id);
  return new Promise(resolve => { tx.oncomplete = resolve; });
}

// --- Tracks list ---
async function showTracks() {
  const tracks = await loadTracks();
  const list = $('tracksList');

  if (tracks.length === 0) {
    list.innerHTML = '<div class="empty-state">Aucun parcours enregistré.<br>Appuie sur le bouton rouge pour commencer.</div>';
  } else {
    list.innerHTML = tracks.reverse().map(t => {
      const d = new Date(t.date);
      const dateStr = d.toLocaleDateString('fr-KH', { day: 'numeric', month: 'short', year: 'numeric' });
      const timeStr = d.toLocaleTimeString('fr-KH', { hour: '2-digit', minute: '2-digit' });
      return `<div class="track-item" data-id="${t.id}">
        <div class="track-item-top">
          <div class="track-item-date">${dateStr} à ${timeStr}</div>
          <div class="track-item-actions">
            <button onclick="exportTrackGPX(${t.id}); event.stopPropagation();">GPX</button>
            <button class="delete" onclick="removeTrack(${t.id}); event.stopPropagation();">Suppr.</button>
          </div>
        </div>
        <div class="track-item-stats">
          <div><span>${(t.distance/1000).toFixed(2)}</span> km</div>
          <div><span>↑ ${Math.round(t.elevGain)}</span> m</div>
          <div><span>${formatTime(t.movingTime)}</span></div>
        </div>
      </div>`;
    }).join('');
  }

  $('tracksOverlay').classList.add('visible');
}

async function exportTrackGPX(id) {
  const tracks = await loadTracks();
  const t = tracks.find(x => x.id === id);
  if (!t) return;
  const name = `KampotRiders_${t.date.slice(0,10)}`;
  const gpx = generateGPX(t.points, name);
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}.gpx`;
  a.click();
  URL.revokeObjectURL(url);
  toast('GPX exporté');
}

async function removeTrack(id) {
  if (!confirm('Supprimer ce parcours ?')) return;
  await deleteTrack(id);
  showTracks();
  toast('Parcours supprimé');
}

// Expose to inline handlers
window.exportTrackGPX = exportTrackGPX;
window.removeTrack = removeTrack;

btnTracks.addEventListener('click', showTracks);
$('btnCloseOverlay').addEventListener('click', () => {
  $('tracksOverlay').classList.remove('visible');
});

// --- Init ---
async function init() {
  await openDB();

  // Start GPS immediately to get position on map
  if ('geolocation' in navigator) {
    state.watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000
    });
    statusBadge.textContent = 'PRÊT';
  } else {
    toast('GPS non disponible sur cet appareil');
    statusBadge.textContent = 'PAS DE GPS';
  }
}

init();
</script>
