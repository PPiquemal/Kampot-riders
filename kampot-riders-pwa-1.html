<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a0a">
<title>Kampot Riders</title>
<link rel="manifest" href="data:application/json,{}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a0a;
    --surface: #241212;
    --surface2: #2e1818;
    --gold: #d4a843;
    --gold-dim: #8a6a2a;
    --red: #c42030;
    --red-bright: #e83040;
    --text: #f0e8dc;
    --text-dim: #8a7a6a;
    --green: #30b860;
    --blue: #4a90d4;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Outfit', 'Noto Sans Khmer', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid rgba(212,168,67,0.1);
    z-index: 1000;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--gold), #e8c860);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .wake-icon { font-size: 0.75rem; opacity: 0; transition: opacity 0.3s; }
  .wake-icon.active { opacity: 1; }
  .header-status {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 20px; transition: all 0.3s;
  }
  .header-status.idle { color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08); }
  .header-status.recording { color: var(--red-bright); border: 1px solid var(--red); animation: pulse 1.5s infinite; }
  .header-status.paused { color: var(--gold); border: 1px solid var(--gold-dim); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .map-container { flex: 1; position: relative; min-height: 0; }
  #map { width: 100%; height: 100%; }
  .leaflet-control-attribution { font-size: 9px !important; }

  .gps-indicator {
    position: absolute; top: 12px; left: 12px; z-index: 800;
    display: flex; align-items: center; gap: 6px;
    background: rgba(26,10,10,0.85); backdrop-filter: blur(10px);
    padding: 6px 12px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 600; color: var(--text-dim); transition: all 0.3s;
  }
  .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; }
  .gps-dot.good { background: var(--green); }
  .gps-dot.fair { background: var(--gold); }
  .gps-dot.poor { background: var(--red); }

  .btn-recenter {
    position: absolute; bottom: 16px; right: 12px; z-index: 800;
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: rgba(26,10,10,0.88); backdrop-filter: blur(10px);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .btn-recenter:active { transform: scale(0.9); }
  .btn-recenter svg { width: 22px; height: 22px; stroke: var(--text-dim); fill: none; stroke-width: 2; transition: stroke 0.2s; }
  .btn-recenter.following svg { stroke: var(--blue); }

  .pause-badge {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 800; background: rgba(26,10,10,0.9); backdrop-filter: blur(10px);
    color: var(--gold); font-size: 1rem; font-weight: 600; letter-spacing: 0.1em;
    padding: 12px 28px; border-radius: 30px; border: 1px solid var(--gold-dim);
    display: none; pointer-events: none; animation: fadeIn 0.3s;
  }
  .pause-badge.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } }

  .stats-panel {
    background: var(--surface); border-top: 1px solid rgba(212,168,67,0.1);
    padding: 12px 16px 8px; flex-shrink: 0;
  }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box {
    text-align: center; padding: 6px 4px; background: var(--surface2);
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.03);
  }
  .stat-value { font-size: 1.4rem; font-weight: 800; line-height: 1.1; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-value.speed { color: var(--gold); }
  .stat-value.distance { color: var(--green); }
  .stat-label { font-size: 0.6rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .stats-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
  .stat-mini { text-align: center; padding: 4px; }
  .stat-mini .stat-value { font-size: 0.95rem; font-weight: 600; }
  .stat-mini .stat-label { font-size: 0.55rem; }

  .controls {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    padding: 12px 16px 20px; background: var(--surface); flex-shrink: 0;
  }
  .btn-record {
    width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--red);
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .btn-record:active { transform: scale(0.92); }
  .btn-record-inner { width: 52px; height: 52px; border-radius: 50%; background: var(--red-bright); transition: all 0.3s; }
  .btn-record.recording .btn-record-inner { width: 28px; height: 28px; border-radius: 6px; background: var(--red-bright); }

  .btn-secondary {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: var(--text-dim);
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .btn-secondary:active { transform: scale(0.92); background: rgba(255,255,255,0.05); }
  .btn-secondary.hidden { opacity: 0; pointer-events: none; }
  .btn-secondary svg { width: 20px; height: 20px; stroke: var(--text-dim); fill: none; stroke-width: 2; }

  .toast {
    position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(26,10,10,0.92); backdrop-filter: blur(10px); color: var(--text);
    font-size: 0.8rem; font-weight: 500; padding: 10px 20px; border-radius: 24px;
    border: 1px solid rgba(212,168,67,0.15); z-index: 2000;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
  .overlay.visible { display: flex; }
  .overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: var(--surface); border-bottom: 1px solid rgba(212,168,67,0.1);
    position: sticky; top: 0; z-index: 10;
  }
  .overlay-header h2 { font-size: 1rem; font-weight: 700; color: var(--gold); }
  .overlay-close {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--surface2); color: var(--text-dim); font-size: 1.2rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .tracks-list { padding: 12px 16px; }
  .track-item {
    background: var(--surface2); border-radius: var(--radius); padding: 14px;
    margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03);
    cursor: pointer; transition: background 0.15s;
  }
  .track-item:active { background: rgba(255,255,255,0.05); }
  .track-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .track-item-date { font-size: 0.8rem; font-weight: 600; color: var(--text); }
  .track-item-actions { display: flex; gap: 8px; }
  .track-item-actions button {
    background: none; border: none; color: var(--text-dim);
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer; padding: 4px 8px;
    border-radius: 6px; transition: all 0.15s;
  }
  .track-item-actions button:hover { color: var(--gold); background: rgba(212,168,67,0.08); }
  .track-item-actions button.delete:hover { color: var(--red-bright); background: rgba(200,30,30,0.08); }
  .track-item-stats { display: flex; gap: 16px; font-size: 0.75rem; color: var(--text-dim); }
  .track-item-stats span { font-weight: 600; color: var(--text); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 0.85rem; }
</style>
</head>
<body>

<div class="header">
  <h1>KAMPOT RIDERS</h1>
  <div class="header-right">
    <span class="wake-icon" id="wakeIcon" title="Screen stays on">☀️</span>
    <div class="header-status idle" id="statusBadge">GPS OFF</div>
  </div>
</div>

<div class="map-container">
  <div id="map"></div>
  <div class="gps-indicator" id="gpsIndicator">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsText">Waiting for GPS...</span>
  </div>
  <div class="pause-badge" id="pauseBadge">⏸ AUTO-PAUSE</div>
  <button class="btn-recenter following" id="btnRecenter" title="Center on position">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <circle cx="12" cy="12" r="8" stroke-dasharray="2 2" opacity="0.4"/>
    </svg>
  </button>
</div>

<div class="stats-panel">
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value speed" id="speed">0.0</div>
      <div class="stat-label">km/h</div>
    </div>
    <div class="stat-box">
      <div class="stat-value distance" id="distance">0.00</div>
      <div class="stat-label">km</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="movingTime">00:00</div>
      <div class="stat-label">Moving</div>
    </div>
  </div>
  <div class="stats-row2">
    <div class="stat-mini">
      <div class="stat-value" id="elevation">0</div>
      <div class="stat-label">Alt. m</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="elevGain">↑ 0</div>
      <div class="stat-label">Gain m</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="avgSpeed">0.0</div>
      <div class="stat-label">Avg km/h</div>
    </div>
    <div class="stat-mini">
      <div class="stat-value" id="totalTime">00:00</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="btn-secondary" id="btnTracks" title="Tracks">
    <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
  </div>
  <div class="btn-record" id="btnRecord">
    <div class="btn-record-inner"></div>
  </div>
  <div class="btn-secondary hidden" id="btnExport" title="Export GPX">
    <span>GPX</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="tracksOverlay">
  <div class="overlay-header">
    <h2>My Tracks</h2>
    <button class="overlay-close" id="btnCloseOverlay">✕</button>
  </div>
  <div class="tracks-list" id="tracksList"></div>
</div>

<script>
const AUTO_PAUSE_RADIUS = 15;
const MIN_ACCURACY = 30;
const ALTITUDE_SMOOTH = 3;
const SPEED_THRESHOLD = 1.5;

const state = {
  recording: false,
  autoPaused: false,
  autoFollow: true,
  watchId: null,
  track: [],
  anchorPoint: null,
  totalDistance: 0,
  elevationGain: 0,
  movingTimeMs: 0,
  lastMovingTick: null,
  startTime: null,
  altitudeBuffer: [],
  currentSpeed: 0,
  currentAlt: 0,
  currentPos: null,
  timerInterval: null,
  wakeLock: null
};

const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([10.594, 104.162], 13);
L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OSM & CyclOSM'
}).addTo(map);

// Break auto-follow when user drags map
map.on('dragstart', () => {
  state.autoFollow = false;
  btnRecenter.classList.remove('following');
});

const trackLine = L.polyline([], { color: '#e83040', weight: 4, opacity: 0.85, smoothFactor: 1 }).addTo(map);
const posMarker = L.circleMarker([0, 0], { radius: 7, fillColor: '#4a90d4', fillOpacity: 1, stroke: true, color: '#fff', weight: 2 });
const accCircle = L.circle([0, 0], { radius: 10, fillColor: '#4a90d4', fillOpacity: 0.08, stroke: true, color: '#4a90d4', weight: 1, opacity: 0.2 });

const $ = id => document.getElementById(id);
const btnRecord = $('btnRecord');
const btnExport = $('btnExport');
const btnTracks = $('btnTracks');
const btnRecenter = $('btnRecenter');
const statusBadge = $('statusBadge');
const pauseBadge = $('pauseBadge');
const gpsDot = $('gpsDot');
const gpsText = $('gpsText');
const wakeIcon = $('wakeIcon');

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function smoothAltitude(alt) {
  state.altitudeBuffer.push(alt);
  if (state.altitudeBuffer.length > ALTITUDE_SMOOTH) state.altitudeBuffer.shift();
  return state.altitudeBuffer.reduce((a, b) => a + b, 0) / state.altitudeBuffer.length;
}

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Screen Wake Lock ---
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      state.wakeLock = await navigator.wakeLock.request('screen');
      wakeIcon.classList.add('active');
      state.wakeLock.addEventListener('release', () => { wakeIcon.classList.remove('active'); });
    }
  } catch (err) { console.warn('Wake Lock failed:', err); }
}

async function releaseWakeLock() {
  if (state.wakeLock) {
    try { await state.wakeLock.release(); } catch (e) {}
    state.wakeLock = null;
    wakeIcon.classList.remove('active');
  }
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && state.recording) await requestWakeLock();
});

// --- Recenter ---
btnRecenter.addEventListener('click', () => {
  if (state.currentPos) map.panTo([state.currentPos.lat, state.currentPos.lng], { animate: true, duration: 0.3 });
  state.autoFollow = true;
  btnRecenter.classList.add('following');
});

// --- GPS ---
function onPosition(pos) {
  const { latitude: lat, longitude: lng, altitude: rawAlt, accuracy, speed: rawSpeed } = pos.coords;
  const time = pos.timestamp;

  if (accuracy <= 10) { gpsDot.className = 'gps-dot good'; gpsText.textContent = `±${Math.round(accuracy)}m`; }
  else if (accuracy <= MIN_ACCURACY) { gpsDot.className = 'gps-dot fair'; gpsText.textContent = `±${Math.round(accuracy)}m`; }
  else { gpsDot.className = 'gps-dot poor'; gpsText.textContent = `±${Math.round(accuracy)}m (weak)`; }

  if (accuracy > MIN_ACCURACY) return;

  state.currentPos = { lat, lng };
  posMarker.setLatLng([lat, lng]).addTo(map);
  accCircle.setLatLng([lat, lng]).setRadius(accuracy).addTo(map);

  const alt = rawAlt != null ? smoothAltitude(rawAlt) : state.currentAlt;
  state.currentAlt = alt;

  let speedKmh = 0;
  if (rawSpeed != null && rawSpeed >= 0) {
    speedKmh = rawSpeed * 3.6;
  } else if (state.track.length > 0) {
    const last = state.track[state.track.length - 1];
    const dt = (time - last.time) / 1000;
    if (dt > 0) speedKmh = (haversine(last.lat, last.lng, lat, lng) / dt) * 3.6;
  }
  state.currentSpeed = speedKmh;

  // Auto-follow
  if (state.autoFollow) map.panTo([lat, lng], { animate: true, duration: 0.5 });

  if (!state.recording) return;

  // Auto-pause logic
  if (!state.anchorPoint) state.anchorPoint = { lat, lng, time };
  const distFromAnchor = haversine(state.anchorPoint.lat, state.anchorPoint.lng, lat, lng);

  if (distFromAnchor <= AUTO_PAUSE_RADIUS && speedKmh < SPEED_THRESHOLD) {
    if (!state.autoPaused) {
      state.autoPaused = true;
      state.lastMovingTick = null;
      statusBadge.textContent = 'PAUSED';
      statusBadge.className = 'header-status paused';
      pauseBadge.classList.add('visible');
    }
    return;
  }

  if (state.autoPaused) {
    state.autoPaused = false;
    state.lastMovingTick = Date.now();
    statusBadge.textContent = '● REC';
    statusBadge.className = 'header-status recording';
    pauseBadge.classList.remove('visible');
  }

  state.anchorPoint = { lat, lng, time };

  if (state.track.length > 0) {
    const last = state.track[state.track.length - 1];
    const segDist = haversine(last.lat, last.lng, lat, lng);
    if (segDist > 500) return;
    state.totalDistance += segDist;
    if (alt != null && last.alt != null) {
      const dAlt = alt - last.alt;
      if (dAlt > 2) state.elevationGain += dAlt;
    }
  }

  const now = Date.now();
  if (state.lastMovingTick) state.movingTimeMs += now - state.lastMovingTick;
  state.lastMovingTick = now;

  state.track.push({ lat, lng, alt, time, speed: speedKmh, accuracy });
  trackLine.addLatLng([lat, lng]);
  updateStats();
}

function onPositionError(err) {
  gpsDot.className = 'gps-dot poor';
  gpsText.textContent = 'GPS unavailable';
}

function updateStats() {
  $('speed').textContent = state.currentSpeed.toFixed(1);
  $('distance').textContent = (state.totalDistance / 1000).toFixed(2);
  $('elevation').textContent = Math.round(state.currentAlt);
  $('elevGain').textContent = `↑ ${Math.round(state.elevationGain)}`;
  const avgSpd = state.movingTimeMs > 0 ? (state.totalDistance / 1000) / (state.movingTimeMs / 3600000) : 0;
  $('avgSpeed').textContent = avgSpd.toFixed(1);
}

function updateTimers() {
  if (!state.recording) return;
  if (!state.autoPaused && state.lastMovingTick) {
    $('movingTime').textContent = formatTime(state.movingTimeMs + (Date.now() - state.lastMovingTick));
  } else {
    $('movingTime').textContent = formatTime(state.movingTimeMs);
  }
  if (state.startTime) $('totalTime').textContent = formatTime(Date.now() - state.startTime);
}

// --- Recording ---
async function startRecording() {
  state.track = []; state.totalDistance = 0; state.elevationGain = 0;
  state.movingTimeMs = 0; state.lastMovingTick = Date.now(); state.startTime = Date.now();
  state.anchorPoint = null; state.autoPaused = false; state.altitudeBuffer = [];
  state.recording = true; state.autoFollow = true;
  btnRecenter.classList.add('following');
  trackLine.setLatLngs([]);
  btnRecord.classList.add('recording');
  btnExport.classList.add('hidden');
  statusBadge.textContent = '● REC';
  statusBadge.className = 'header-status recording';
  await requestWakeLock();
  state.timerInterval = setInterval(updateTimers, 1000);
  if (!state.watchId) {
    state.watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
      enableHighAccuracy: true, maximumAge: 2000, timeout: 10000
    });
  }
  toast('Recording started');
}

async function stopRecording() {
  state.recording = false; state.autoPaused = false;
  if (state.lastMovingTick) { state.movingTimeMs += Date.now() - state.lastMovingTick; state.lastMovingTick = null; }
  clearInterval(state.timerInterval);
  await releaseWakeLock();
  btnRecord.classList.remove('recording');
  statusBadge.textContent = 'STOPPED';
  statusBadge.className = 'header-status idle';
  pauseBadge.classList.remove('visible');
  updateStats(); updateTimers();
  if (state.track.length > 1) {
    btnExport.classList.remove('hidden');
    saveTrackToStorage();
    toast(`Track saved — ${(state.totalDistance / 1000).toFixed(2)} km`);
  } else {
    toast('Not enough points recorded');
  }
}

btnRecord.addEventListener('click', () => { state.recording ? stopRecording() : startRecording(); });

// --- GPX ---
function generateGPX(track, name) {
  const pts = track.map(p => {
    const d = new Date(p.time).toISOString();
    const ele = p.alt != null ? `<ele>${p.alt.toFixed(1)}</ele>` : '';
    return `      <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lng.toFixed(7)}">${ele}<time>${d}</time></trkpt>`;
  }).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="KampotRiders PWA" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>${name}</name><time>${new Date().toISOString()}</time></metadata>
  <trk><name>${name}</name><trkseg>
${pts}
  </trkseg></trk>
</gpx>`;
}

function doExportGPX(track, name) {
  const gpx = generateGPX(track, name);
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${name}.gpx`; a.click();
  URL.revokeObjectURL(url);
  toast('GPX exported');
}

btnExport.addEventListener('click', () => {
  if (state.track.length < 2) return;
  doExportGPX(state.track, `KampotRiders_${new Date().toISOString().slice(0,10)}`);
});

// --- IndexedDB ---
const DB_NAME = 'kampot_riders', DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => { const d = e.target.result; if (!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true }); };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function saveTrackToStorage() {
  if (!db || state.track.length < 2) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').add({
    date: new Date().toISOString(), distance: state.totalDistance,
    elevGain: state.elevationGain, movingTime: state.movingTimeMs,
    totalTime: Date.now() - state.startTime, points: state.track
  });
}

async function loadTracks() {
  if (!db) return [];
  return new Promise(resolve => {
    const req = db.transaction('tracks', 'readonly').objectStore('tracks').getAll();
    req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]);
  });
}

async function deleteTrack(id) {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite'); tx.objectStore('tracks').delete(id);
  return new Promise(resolve => { tx.oncomplete = resolve; });
}

// --- Tracks list ---
async function showTracks() {
  const tracks = await loadTracks();
  const list = $('tracksList');
  if (tracks.length === 0) {
    list.innerHTML = '<div class="empty-state">No tracks recorded yet.<br>Tap the red button to start riding.</div>';
  } else {
    list.innerHTML = tracks.reverse().map(t => {
      const d = new Date(t.date);
      const dateStr = d.toLocaleDateString('en', { day: 'numeric', month: 'short', year: 'numeric' });
      const timeStr = d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
      return `<div class="track-item" data-id="${t.id}">
        <div class="track-item-top">
          <div class="track-item-date">${dateStr} at ${timeStr}</div>
          <div class="track-item-actions">
            <button onclick="exportTrackGPX(${t.id}); event.stopPropagation();">GPX</button>
            <button class="delete" onclick="removeTrack(${t.id}); event.stopPropagation();">Delete</button>
          </div>
        </div>
        <div class="track-item-stats">
          <div><span>${(t.distance/1000).toFixed(2)}</span> km</div>
          <div><span>↑ ${Math.round(t.elevGain)}</span> m</div>
          <div><span>${formatTime(t.movingTime)}</span></div>
        </div>
      </div>`;
    }).join('');
  }
  $('tracksOverlay').classList.add('visible');
}

async function exportTrackGPX(id) {
  const tracks = await loadTracks();
  const t = tracks.find(x => x.id === id);
  if (!t) return;
  doExportGPX(t.points, `KampotRiders_${t.date.slice(0,10)}`);
}

async function removeTrack(id) {
  if (!confirm('Delete this track?')) return;
  await deleteTrack(id); showTracks(); toast('Track deleted');
}

window.exportTrackGPX = exportTrackGPX;
window.removeTrack = removeTrack;
btnTracks.addEventListener('click', showTracks);
$('btnCloseOverlay').addEventListener('click', () => { $('tracksOverlay').classList.remove('visible'); });

// --- Init ---
async function init() {
  await openDB();
  if ('geolocation' in navigator) {
    state.watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
      enableHighAccuracy: true, maximumAge: 3000, timeout: 10000
    });
    statusBadge.textContent = 'READY';
  } else {
    toast('GPS not available on this device');
    statusBadge.textContent = 'NO GPS';
  }
}
init();
</script>
</body>
</html>
