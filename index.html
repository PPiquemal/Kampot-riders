<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kampot Riders</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0a0a">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#1a0a0a; color:white; }
#map { height:80vh; }
.header { display:flex; justify-content:space-between; padding:10px; }
.btn { padding:6px 10px; background:#333; border-radius:8px; cursor:pointer; }
</style>
</head>

<body>

<div class="header">
  <div>KAMPOT RIDERS</div>
  <div><span class="btn" id="btnLang">EN</span></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([10.594,104.162],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
